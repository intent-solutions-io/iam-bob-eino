name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build-test:
    name: build · vet · test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          check-latest: true

      - name: gofmt check
        run: |
          out=$(gofmt -l .)
          if [ -n "$out" ]; then echo "unformatted files:"; echo "$out"; exit 1; fi

      - name: go vet
        run: go vet ./...

      - name: build
        run: go build ./...

      - name: test (race + coverage)
        run: go test -race -coverprofile=coverage.txt ./...

      - name: upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.txt

  # Future required gates (wired as their tooling lands; no-op until then):
  #   - golangci-lint (golangci/golangci-lint-action)
  #   - codecov threshold
  #   - @intentsolutions/audit-harness verify (7-layer taxonomy, curl-installed for Go)
  #   - gosec / govulncheck security scan
